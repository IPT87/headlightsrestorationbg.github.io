<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Restauración de Faros Madrid</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:60px;
text-align:center;
}

button{
background:#ff6600;
color:white;
border:none;
padding:15px 30px;
font-size:18px;
cursor:pointer;
}

section{
padding:50px;
text-align:center;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.gallery img{
width:300px;
margin:10px;
border-radius:10px;
}

.services{
display:flex;
justify-content:center;
gap:40px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

footer{
background:#111;
color:white;
padding:20px;
text-align:center;
}

</style>

</head>

<body>

<header>
<h1>Restauración de Faros</h1>
<p>Haz que tus faros vuelvan a brillar</p>
<button>Reservar por WhatsApp</button>
</header>

<section>
<h2>Antes y Después</h2>

<div class="gallery">
<img src="antes1.jpg">
<img src="despues1.jpg">
<img src="antes2.jpg">
<img src="despues2.jpg">
</div>

</section>

<section>
<h2>Servicios</h2>

<div class="services">

<div class="card">
<h3>Pulido</h3>
<p>40€</p>
</div>

<div class="card">
<h3>Restauración</h3>
<p>60€</p>
</div>

<div class="card">
<h3>Restauración + protección UV</h3>
<p>80€</p>
</div>

</div>

</section>

<footer>

<p>📞 600000000</p>
<p>Madrid</p>

</footer>

</body>
</html>
